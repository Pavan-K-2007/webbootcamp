<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TO DO LIST</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>TO DO LIST</h1>
        <p class="subtitle">Assignment-2</p>

        <div class="creator-info">
          <div class="avatar">
            <img
              src="1355088.jpeg"
              alt="suppose to be an image here"
              height="60"
              width="60"
            />
          </div>
          <div class="bio">
            <h3>Pavan K</h3>
            <p>
              Electronics and Communication Engineering student | Passionate
              about coding
            </p>
          </div>
        </div>
      </header>

      <main>
        <section class="input-section">
          <input
            type="text"
            id="taskInput"
            placeholder="Enter the task to be done here"
            maxlength="100"
          />
          <button id="addBtn">Add Task</button>
        </section>

        <ul class="task-list" id="taskList">
          <!-- Tasks will be added here dynamically -->
        </ul>
      </main>
    </div>

    <script src="script.js"></script>
  </body>
</html>
